<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Noam Hebrew</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18312f;
        --muted: #5f6f6c;
        --paper: #fffdf7;
        --panel: #ffffff;
        --line: #d8e2dc;
        --accent: #1d7f74;
        --accent-dark: #145c54;
        --gold: #f2c14e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(29, 127, 116, 0.08), transparent 36%),
          linear-gradient(225deg, rgba(242, 193, 78, 0.18), transparent 40%),
          var(--paper);
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 38px 0 56px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        color: var(--accent-dark);
        font-weight: 700;
        text-decoration: none;
      }

      .hero {
        display: grid;
        gap: 10px;
        margin: 28px 0 26px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 6vw, 4.9rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .hero p {
        margin: 0;
        max-width: 760px;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.6;
      }

      .activity-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .activity-card {
        display: grid;
        min-height: 240px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 14px 32px rgba(24, 49, 47, 0.08);
        text-decoration: none;
        color: inherit;
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      }

      .activity-card:focus,
      .activity-card:hover {
        transform: translateY(-2px);
        border-color: rgba(29, 127, 116, 0.42);
        box-shadow: 0 18px 38px rgba(24, 49, 47, 0.12);
        outline: none;
      }

      .activity-card:focus-visible {
        outline: 3px solid rgba(29, 127, 116, 0.35);
        outline-offset: 4px;
      }

      .activity-card span {
        width: fit-content;
        align-self: start;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(242, 193, 78, 0.22);
        color: #6c520d;
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .activity-card h2 {
        margin: 34px 0 8px;
        font-size: 1.45rem;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .activity-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 24px, 1040px);
          padding-top: 24px;
        }

        .activity-grid {
          grid-template-columns: 1fr;
        }

        .activity-card {
          min-height: 210px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back-link" href="/">Back to App Library</a>

      <section class="hero" aria-labelledby="page-title">
        <h1 id="page-title">Noam Hebrew</h1>
        <p>Two Hebrew practice activities collected in one folder for easier library navigation.</p>
      </section>

      <section class="activity-grid" aria-label="Noam Hebrew activities">
        <a class="activity-card" href="ki-teitzei-chant-arcade.html">
          <span>Chant</span>
          <h2>Ki Teitzei Chant Arcade</h2>
          <p>Visible trope coach and chant practice.</p>
        </a>

        <a class="activity-card" href="hebrew-prayer-reading-arcade-transliteration.html">
          <span>Prayer Reading</span>
          <h2>Hebrew Prayer Reading Arcade</h2>
          <p>Reading-only prayer practice with transliteration support.</p>
        </a>
      </section>
    </main>
  </body>
</html>
